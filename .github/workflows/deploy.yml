name: Deploy to Hostinger VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DEPLOY_PATH: /opt/tfw

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install website dependencies
        working-directory: website
        run: npm install

      - name: Build client
        working-directory: website
        run: npm run build:client

      - name: Build server
        working-directory: website
        run: npm run build:server

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check if deploy secrets are configured
        id: secrets-check
        run: |
          if [ -n "$DEPLOY_HOST" ]; then
            echo "configured=true" >> $GITHUB_OUTPUT
          else
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "::warning::Deploy secrets not configured. Add VPS_HOST, VPS_USER, VPS_SSH_KEY to repo secrets to enable auto-deploy."
          fi
        env:
          DEPLOY_HOST: ${{ secrets.VPS_HOST }}

      - name: Deploy to VPS via SSH
        if: steps.secrets-check.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /opt/tfw

            # Pull latest code
            git pull origin main

            # Build and restart app container
            docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build app

            # Clean up old images
            docker image prune -f

            # Wait for container to become healthy (up to 90s)
            echo "Waiting for health check..."
            for i in $(seq 1 18); do
              sleep 5
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' tfw_app 2>/dev/null || echo "unknown")
              if [ "$STATUS" = "healthy" ]; then
                echo "Container healthy after $((i*5))s"
                break
              fi
              if [ $i -eq 18 ]; then
                echo "ERROR: Container did not become healthy within 90s (status: $STATUS)"
                docker logs tfw_app --tail 20
                exit 1
              fi
            done

            echo "Deployment complete!"
