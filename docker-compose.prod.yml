services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    container_name: tfw_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-tfw}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-tfw_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tfw_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tfw} -d ${DB_NAME:-tfw_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Website App (Express + React SPA) ──
  app:
    build:
      context: ./website
      dockerfile: Dockerfile
    container_name: tfw_app
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-tfw}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-tfw_db}
      JWT_SECRET: ${JWT_SECRET}
      API_PORT: 5000
      CLIENT_URL: ${CLIENT_URL:-https://theframedwall.com}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      SHIPROCKET_EMAIL: ${SHIPROCKET_EMAIL:-}
      SHIPROCKET_PASSWORD: ${SHIPROCKET_PASSWORD:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
    volumes:
      - uploads_data:/app/uploads
    networks:
      - tfw_network

  # ── Nginx Reverse Proxy ──
  nginx:
    image: nginx:alpine
    container_name: tfw_nginx
    restart: always
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_data:/var/www/certbot:ro
    networks:
      - tfw_network

  # ── Certbot for SSL (Let's Encrypt) ──
  certbot:
    image: certbot/certbot
    container_name: tfw_certbot
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - certbot_data:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  uploads_data:
  certbot_data:

networks:
  tfw_network:
    driver: bridge
